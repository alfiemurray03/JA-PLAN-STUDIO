name: Publish Cloudflare Pages Bundle

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-public:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build deployable public bundle
        run: npm run build

      - name: Verify plans and recovery assets are compiled
        shell: bash
        run: |
          set -euo pipefail
          test -f public/index.html
          test -f public/.asset-manifest.json
          test -f public/assets/analytics-XYhWdSNH.js
          grep -R --include='*.js' -F 'Standard Plans' public/assets >/dev/null
          grep -R --include='*.js' -F 'Business Plans' public/assets >/dev/null
          grep -R --include='*.js' -F 'accountType=' public/assets >/dev/null
          grep -R --include='*.js' -F 'Secure application recovery' public/assets >/dev/null
          grep -F 'analytics-compat-refresh' public/assets/analytics-XYhWdSNH.js >/dev/null
          grep -F "ja-plan-studio-shell-v7" public/sw.js >/dev/null
          grep -F "if (isAdminRoute(url.pathname)) return false;" public/sw.js >/dev/null
          grep -F "fetch(request, { cache: 'no-store', redirect: 'follow' })" public/sw.js >/dev/null

      - name: Upload deployable bundle
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-public-${{ github.sha }}
          path: public/
          if-no-files-found: error
          retention-days: 7

      - name: Commit refreshed public bundle
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A public
          if git diff --cached --quiet; then
            echo 'The committed public bundle is already current.'
            exit 0
          fi
          git commit -m 'Build production public bundle [skip public-build]'
          git push origin "HEAD:${GITHUB_REF_NAME}"
