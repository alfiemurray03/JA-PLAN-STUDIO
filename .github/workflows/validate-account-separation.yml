name: Validate Account Separation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: account-separation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  account-separation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build customer application
        run: npm run build

      - name: Test account and itinerary boundaries
        run: node --test tests/account-type-itinerary-access.test.mjs
