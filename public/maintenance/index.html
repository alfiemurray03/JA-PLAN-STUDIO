      align-items: center;
      justify-content: center;
      gap: 1rem;

      text-decoration: none;
    }
    .footer-links a:hover { color: hsl(var(--foreground)); }
    .footer-links button {
      background: none;
      border: none;
      color: hsl(var(--primary));
      cursor: pointer;

      text-decoration: underline;
