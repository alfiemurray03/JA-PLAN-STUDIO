<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JA Plan Studio</title>
    <script>
      (function () {
        try {
          var path = window.location.pathname.replace(/\/+$/, '') || '/';
          if (path === '/admin' || path.indexOf('/admin/') === 0) {
            document.title = 'JA Plan Studio Admin Portal';
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var u = new URL(location.href);
          if (u.searchParams.has('airoShareToken')) {
            u.searchParams.delete('airoShareToken');
            history.replaceState(null, '', u.toString());
          }
        } catch (e) {}
      })();
    </script>
    <meta name="referrer" content="same-origin" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b172d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JA Plan Studio" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260718-4" />
    <link rel="shortcut icon" type="image/svg+xml" href="/favicon.svg?v=20260718-4" />
    <!--app-head-->
    <script src="/airo-video-slots.js"></script>
    <script src="/airo-logo-orientation.js"></script>
  </head>
  <body class="fs-unmask-airo-app-builder">
    <div id="app" class="fs-unmask-airo-app-builder"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/analytics.js"></script>
  </body>
</html>
